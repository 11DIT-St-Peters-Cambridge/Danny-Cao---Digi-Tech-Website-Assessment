<!DOCTYPE html>
<html>
    <head>
        <title>Stakeholder Website</title>
        <link rel="stylesheet" href="Style.css">
        <script src="Main.Js"></script>
        <meta name="description" content="Stakeholders website description">
        <meta name="keywords" content="Stakeholders name, Teacher, Computer">
        <meta name="author" content="Danny Cao">
        <meta name="viewport" content="width=device-width, initial-scale-1.0">
    </head>
    <body>
        <div id="Nav-Bar">
            <a href="MainPage.html"><img src="Logo-Substitute.png" alt="logo"></a>
            <a href="MainPage.html"><h1>NAME</h1></a>
            <a href="MainPage.html"><h2>MENU</h2></a>
            <button id="Menu-Button" popovertarget="OpenMenu"></button>
        </div>
        <div popover id="OpenMenu">
            <a href="MainPage.html"><h3>Home</h3></a>
            <a href="AdoptionPage.html"><h3>Adopt Now</h3></a>
            <a href="ContactPage.html"><h3>Contact Us</h3></a>
            <a href="Login.html"><h3>Login</h3></a>

        </div>
            <div id="Screen-Overlay"></div>
        <script>
                const overlay = document.getElementById("Screen-Overlay");
                overlay.addEventListener("click", (e) => {overlay.style.display = "none"});
                const popover = document.getElementById("Menu-Button")
                popover.addEventListener("click", (e)  => {overlay.style.display = "block"});

            </script>
        <div id="Header">
            <img src="Header-Image.jpg" alt="Header-Image">
            <h1>Find A Pet Today</h1>
            <div id="Text-Box">
                <h2>Our organization helps you find a pet that you would love, with no trouble at all.</h2>
            </div>
            <button type="button" onclick="location.href='AdoptionPage.html'" id="Adopt-Today">Adopt Today</button>
            <button type="button" onclick="location.href='AdoptionPage.html'" id="Donate-Pet">Donate A Stray</button>
        </div>
        <div id="Stats">
            <span id="Circle1" class="dot"></span>
            <span id="Circle2" class="dot"></span>
            <span id="Circle3" class="dot"></span>
            <span id="Big-Circle" class="dot"></span>
        </div>
        <div id="Preview">
            <h1>Find your perfect pet, or help our longest staying residents</h1>
            <div class="dropdown">
                <button onclick="myFunction()" class="dropbtn">Dropdown</button>
                <div id="myDropdown" class="dropdown-content">
                    <a href="#home">Home</a>
                    <a href="#about">About</a>
                    <a href="#contact">Contact</a>
                    <script>
                    function myFunction() {
                        document.getElementById("myDropdown").classList.toggle("show");
                    }
                    window.onclick = function(event) {
                    if (!event.target.matches('.dropbtn')) {
                        var dropdowns = document.getElementsByClassName("dropdown-content");
                        var i;
                        for (i = 0; i < dropdowns.length; i++) {
                        var openDropdown = dropdowns[i];
                        if (openDropdown.classList.contains('show')) {
                            openDropdown.classList.remove('show');
                        }
                        }
                    }
                    }
                    </script>
                </div>
            </div>
        </div>
        </div>
        <!--Content-->
        <div id="Footer">

        </div>

    </body>
</html>
